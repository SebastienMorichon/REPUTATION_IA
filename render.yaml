services:
  # ═══════════════════════════════════════════════════════════════
  # API FastAPI — Web Service
  # ═══════════════════════════════════════════════════════════════
  - type: web
    name: reputation-ai-api
    env: python
    region: frankfurt
    plan: free
    rootDir: apps/api
    # NOTE: playwright chromium intentionally NOT installed here.
    # The PDF endpoint returns HTTP 503 when chromium is absent —
    # install it on a paid instance if PDF generation is required.
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0

      # ── Database ───────────────────────────────────────────────
      - key: DATABASE_URL
        fromDatabase:
          name: reputation-db
          property: connectionString

      # ── Celery / Redis ─────────────────────────────────────────
      # Create a FREE Redis at https://console.upstash.com
      # Copy the "Redis URL" (starts with rediss://) and paste below
      - key: CELERY_BROKER_URL
        sync: false        # → set manually in Render dashboard
      - key: CELERY_RESULT_BACKEND
        sync: false        # → same Upstash URL

      # ── Auth ───────────────────────────────────────────────────
      - key: JWT_SECRET
        generateValue: true

      # ── LLM Providers ─────────────────────────────────────────
      - key: ANTHROPIC_ENABLED
        value: "true"
      - key: ANTHROPIC_API_KEY
        sync: false        # → set in dashboard
      - key: OPENAI_ENABLED
        value: "false"
      - key: OPENAI_API_KEY
        sync: false
      - key: PERPLEXITY_ENABLED
        value: "false"
      - key: PERPLEXITY_API_KEY
        sync: false

      # ── Analyzer ───────────────────────────────────────────────
      - key: ANALYZER_PROVIDER
        value: anthropic
      - key: ANALYZER_MODEL
        value: claude-sonnet-4-20250514

      # ── CORS / Frontend ────────────────────────────────────────
      # Set this to your Vercel frontend URL once deployed
      # e.g. https://reputation-ai.vercel.app
      - key: WEB_ORIGIN
        sync: false

      # ── Payments (optional) ────────────────────────────────────
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_STARTER_PRICE_ID
        sync: false
      - key: STRIPE_PRO_PRICE_ID
        sync: false
      - key: STRIPE_AGENCY_PRICE_ID
        sync: false

  # ═══════════════════════════════════════════════════════════════
  # Celery Worker — Background Worker
  # Processes LLM analysis tasks enqueued by the API
  # ═══════════════════════════════════════════════════════════════
  - type: worker
    name: reputation-ai-worker
    env: python
    region: frankfurt
    plan: free
    rootDir: apps/api
    buildCommand: pip install -r requirements.txt
    startCommand: >-
      celery -A app.worker.celery_app worker
      --loglevel=warning
      --concurrency=2
      -n worker1@%h
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0

      - key: DATABASE_URL
        fromDatabase:
          name: reputation-db
          property: connectionString

      # Share Redis URLs from the API service — no duplication
      - key: CELERY_BROKER_URL
        fromService:
          type: web
          name: reputation-ai-api
          envVarKey: CELERY_BROKER_URL
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: web
          name: reputation-ai-api
          envVarKey: CELERY_RESULT_BACKEND

      # Share secrets from the API service
      - key: JWT_SECRET
        fromService:
          type: web
          name: reputation-ai-api
          envVarKey: JWT_SECRET
      - key: ANTHROPIC_API_KEY
        fromService:
          type: web
          name: reputation-ai-api
          envVarKey: ANTHROPIC_API_KEY
      - key: OPENAI_API_KEY
        fromService:
          type: web
          name: reputation-ai-api
          envVarKey: OPENAI_API_KEY
      - key: PERPLEXITY_API_KEY
        fromService:
          type: web
          name: reputation-ai-api
          envVarKey: PERPLEXITY_API_KEY

      - key: ANTHROPIC_ENABLED
        value: "true"
      - key: OPENAI_ENABLED
        value: "false"
      - key: PERPLEXITY_ENABLED
        value: "false"
      - key: ANALYZER_PROVIDER
        value: anthropic
      - key: ANALYZER_MODEL
        value: claude-sonnet-4-20250514

# ═══════════════════════════════════════════════════════════════
# PostgreSQL Database (free — Frankfurt)
# ═══════════════════════════════════════════════════════════════
databases:
  - name: reputation-db
    databaseName: reputation_ai
    user: reputation_user
    region: frankfurt
    plan: free
