services:
  # API FastAPI
  - type: web
    name: reputation-ai-api
    env: python
    region: frankfurt
    plan: free
    rootDir: apps/api
    buildCommand: |
      pip install -r requirements.txt
    startCommand: |
      uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DATABASE_URL
        fromDatabase:
          name: reputation-db
          property: connectionString
      - key: CELERY_BROKER_URL
        sync: false
      - key: CELERY_RESULT_BACKEND
        fromDatabase:
          name: reputation-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ANTHROPIC_ENABLED
        value: true
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_ENABLED
        value: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ANALYZER_PROVIDER
        value: anthropic
      - key: ANALYZER_MODEL
        value: claude-sonnet-4-20250514
      - key: FRONTEND_URL
        sync: false
      - key: WEB_ORIGIN
        sync: false

databases:
  - name: reputation-db
    databaseName: reputation_ai
    user: reputation_user
    plan: free
